<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EZ-Food</title>
  <style>
    :root {
      --bg: #f6f3ec;
      --card: #fffdf9;
      --line: #dfd7ca;
      --text: #233028;
      --muted: #67746c;
      --accent: #547a5a;
      --accent-2: #6d8d72;
      --danger: #af5a5a;
      --shadow: 0 8px 24px rgba(0,0,0,.08);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .app {
      max-width: 760px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 14px 14px 28px;
    }
    .title {
      font-size: 1.9rem;
      font-weight: 800;
      text-align: center;
      margin: 10px 0 14px;
      letter-spacing: .02em;
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }
    .tab-btn, .action-btn, .mini-btn, .ghost-btn {
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      border-radius: 12px;
      padding: 12px 10px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow);
    }
    .tab-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .top-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .action-btn {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .action-btn.secondary {
      background: var(--accent-2);
      border-color: var(--accent-2);
    }
    .panel {
      display: none;
    }
    .panel.active {
      display: block;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 1.02rem;
      font-weight: 800;
      margin: 0 0 8px;
    }
    .muted {
      color: var(--muted);
      font-size: .94rem;
    }
    .dinner-row {
      display: grid;
      grid-template-columns: 76px 1fr auto auto;
      gap: 8px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #eee6da;
    }
    .dinner-row:last-child { border-bottom: 0; }
    .dinner-row label {
      font-weight: 700;
      font-size: .95rem;
    }
    select, input[type="text"], input[type="url"], textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      font: inherit;
      background: white;
      color: var(--text);
    }
    .mini-btn {
      padding: 11px 12px;
      box-shadow: none;
      white-space: nowrap;
    }
    .mini-btn.rand {
      background: #eef7ef;
      border-color: #cfe2d2;
    }
    .mini-btn.clear {
      background: #faf1f1;
      border-color: #e8caca;
      color: #7b3f3f;
    }
    .links-list {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }
    .recipe-link {
      display: block;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      text-decoration: none;
      color: var(--accent);
      background: white;
      font-weight: 700;
    }
    .recipe-link.disabled {
      color: var(--muted);
      pointer-events: none;
    }
    .shopping-list {
      display: grid;
      gap: 8px;
    }
    .shop-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
    }
    .shop-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin: 0;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }
    .shop-item.checked .text {
      text-decoration: line-through;
      color: var(--muted);
    }
    .text {
      flex: 1;
      word-break: break-word;
    }
    .item-type {
      font-size: .75rem;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
    }
    .inline-add {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }
    .ghost-btn {
      box-shadow: none;
      background: white;
    }
    .danger {
      color: #8e4040;
      border-color: #e3c3c3;
      background: #fcf4f4;
    }
    .ingredient-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-bottom: 8px;
    }
    .editor-actions, .db-actions {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(2, 1fr);
    }
    .db-actions.three {
      grid-template-columns: repeat(3, 1fr);
    }
    .download-box {
      margin-top: 10px;
      padding: 10px 12px;
      background: #eef7ef;
      border: 1px solid #cfe2d2;
      border-radius: 12px;
    }
    .download-box a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }
    .message {
      margin-top: 8px;
      color: var(--muted);
      min-height: 1.2em;
      font-size: .92rem;
    }
    @media (max-width: 560px) {
      .dinner-row {
        grid-template-columns: 1fr;
        gap: 6px;
        padding: 12px 0;
      }
      .dinner-controls {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px;
        align-items: center;
      }
      .top-actions, .editor-actions, .db-actions, .db-actions.three {
        grid-template-columns: 1fr;
      }
      .inline-add {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">EZ-Food</div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="dinners">Dinners</button>
      <button class="tab-btn" data-tab="shopping">Shopping</button>
      <button class="tab-btn" data-tab="other">Other</button>
    </div>

    <div class="top-actions">
      <button id="generateBtn" class="action-btn">Generate Shopping List</button>
      <button id="randomizeAllBtn" class="action-btn secondary">Randomize All</button>
    </div>

    <section id="tab-dinners" class="panel active">
      <div class="card">
        <div id="dinnerRows"></div>
      </div>

      <div class="card">
        <div class="section-title">Recipe Links</div>
        <div class="muted">These appear after you generate the shopping list.</div>
        <div id="recipeLinks" class="links-list"></div>
      </div>
    </section>

    <section id="tab-shopping" class="panel">
      <div class="card">
        <div class="section-title">Shopping List</div>
        <div id="shoppingList" class="shopping-list"></div>
      </div>

      <div class="card">
        <div class="section-title">Add Item</div>
        <div class="inline-add">
          <input id="extraItemInput" type="text" placeholder="Add a manual item" />
          <button id="addExtraBtn" class="ghost-btn">Add Item</button>
        </div>
      </div>
    </section>

    <section id="tab-other" class="panel">
      <div class="card">
        <div class="section-title">Dinner Editor</div>
        <div class="muted" style="margin-bottom:8px;">Choose an existing dinner to edit, or pick New Dinner.</div>
        <select id="editorSelect"></select>

        <div style="height:10px"></div>
        <label class="muted">Dinner Title</label>
        <input id="editorTitle" type="text" placeholder="Dinner title" />

        <div style="height:12px"></div>
        <div class="section-title" style="font-size:.98rem;">Ingredients</div>
        <div id="ingredientEditor"></div>
        <button id="addIngredientBtn" class="ghost-btn" style="width:100%;margin-top:4px;">Add Ingredient</button>

        <div style="height:12px"></div>
        <label class="muted">Recipe Name</label>
        <input id="editorRecipeName" type="text" placeholder="Optional recipe name" />

        <div style="height:10px"></div>
        <label class="muted">Recipe Link</label>
        <input id="editorRecipeUrl" type="url" placeholder="https://example.com/recipe" />

        <div style="height:12px"></div>
        <div class="editor-actions">
          <button id="saveDinnerBtn" class="action-btn">Save Dinner</button>
          <button id="deleteDinnerBtn" class="ghost-btn danger">Delete Dinner</button>
        </div>
        <div id="editorMessage" class="message"></div>
      </div>

      <div class="card">
        <div class="section-title">Database</div>
        <div class="muted" id="dbVersionText">Database Version: 1.0</div>
        <div style="height:12px"></div>
        <div class="db-actions three">
          <button id="exportBtn" class="ghost-btn">Export JSON</button>
          <label class="ghost-btn" style="display:flex;align-items:center;justify-content:center;">
            <input id="importInput" type="file" accept=".json" style="display:none;" />
            Import JSON
          </label>
          <button id="resetBtn" class="ghost-btn">Reset to Default</button>
        </div>
        <div style="height:8px"></div>
        <button id="updateInternalBtn" class="action-btn" style="width:100%;">Update Internal Database</button>
        <div id="downloadArea"></div>
        <div id="dbMessage" class="message"></div>
      </div>
    </section>
  </div>

<script>
const APP_TITLE = "EZ-Food";
const DEFAULT_VERSION = "1.0";
const DEFAULT_DINNERS = [{"id": "lentil-soup", "name": "Lentil Soup", "recipeName": "1-Pot Vegan Lentil Soup | Minimalist Baker Recipes", "recipeUrl": "", "ingredients": ["4 Large Carrots", "4 Stalks Celery", "3 cups baby potatoes", "1/2 onion", "2 cups chopped kale", "6 cups veggie broth", "1 cup green or brown lentils", "Rosemary", "Thyme"]}, {"id": "mushroom-fettucini", "name": "Mushroom Fettucini", "recipeName": "", "recipeUrl": "", "ingredients": ["Parmesean", "Fettucine", "2.5 cups veggies broth", "8oz Baby Bella Mushrooms", "Heavy Cream"]}, {"id": "hot-dogs-and-beans", "name": "Hot Dogs and Beans", "recipeName": "", "recipeUrl": "", "ingredients": ["Hot Dogs", "Hot Dog Buns", "Tater Tots", "Beans"]}, {"id": "vegetarian-chilli", "name": "Vegetarian Chilli", "recipeName": "", "recipeUrl": "", "ingredients": ["19oz Can Black Bean Soup", "15oz Kidney Beans", "15oz Can Garbanzo Beans", "16oz Baked Beans", "15oz Can Chopped Tomatoes", "1 Large Onion", "1 Green Bell Pepper", "2 Stalks Celery", "1 Can Corn", "1 Packet chili spices"]}, {"id": "gurstenne-soup", "name": "Gurstenne Soup", "recipeName": "Gerstensuppe", "recipeUrl": "", "ingredients": ["1 Large Onion", "1 Leek", "3 Medium Carrots", "3 Celery Stalks", "1 Bay Leaf", "5oz Smoked Bacon", "8 Cups Chicken Stock", "Pearl Barley", "2 Russet Potatoes", "1 Cup Cream"]}, {"id": "spaghetti-and-meatball", "name": "Spaghetti and Meatball", "recipeName": "", "recipeUrl": "", "ingredients": ["Spaghetti", "Frozen Meatballs", "Vegetarian Tomato Sauce"]}, {"id": "lemon-garlic-kale-salad", "name": "Lemon Garlic Kale Salad", "recipeName": "", "recipeUrl": "", "ingredients": ["1/2 Cup Nuts", "1 Large Kale Bunch", "Parmesean", "1 Large Lemon"]}, {"id": "strawberry-spinach-salad", "name": "Strawberry Spinach Salad", "recipeName": "Spinach Strawberry Salad", "recipeUrl": "", "ingredients": ["1lb Strawberries", "Feta Cheese", "1/4 Red Onion", "Pecans", "11oz Baby Spinach", "Balsmaic Vineagar", "Olive Oil", "Maple Syrup"]}, {"id": "avocado-toast", "name": "Avocado Toast", "recipeName": "", "recipeUrl": "", "ingredients": ["Sandwich Bread (4)", "2 Avocados", "Cherry Tomatoes", "Balsamic Glaze", "Feta Cheese"]}, {"id": "grilled-cheese-with-tomato-soup", "name": "Grilled Cheese with Tomato Soup", "recipeName": "", "recipeUrl": "", "ingredients": ["Sandwich Bread (4)", "Cheese Sample", "Tomato Soup"]}, {"id": "panini", "name": "Panini", "recipeName": "", "recipeUrl": "", "ingredients": ["Sandwich Bread (4)", "Panini Cheese Choice", "1 Tomato", "1 Large Onion"]}, {"id": "cesar-salad", "name": "Cesar Salad", "recipeName": "", "recipeUrl": "", "ingredients": ["Iceberg Lettuce", "Roma Tomatoes", "Cesar Dressing", "Parmesean"]}, {"id": "frozen-pizza", "name": "Frozen Pizza", "recipeName": "", "recipeUrl": "", "ingredients": ["Frozen Pizza"]}, {"id": "jackfruit-chicken-quesidillas", "name": "Jackfruit/Chicken Quesidillas", "recipeName": "", "recipeUrl": "https://itdoesnttastelikechicken.com/easy-vegan-jackfruit-tacos/", "ingredients": ["1 Can Jackfruit (green ideally)", "Some chicken", "Fajita Spice Packet", "1 Large Onion", "Salsa", "Mexican Cheese", "Tortillas"]}, {"id": "pesto-egg-salad", "name": "Pesto Egg Salad", "recipeName": "Pesto Egg Salad", "recipeUrl": "", "ingredients": ["6 Eggs", "Mayo", "2 cups basil", "Parmesean", "garlic", "green onions"]}, {"id": "creamy-bean-burritos", "name": "Creamy Bean Burritos", "recipeName": "Cheesy Beam Burritos", "recipeUrl": "", "ingredients": ["1 can Rotel Diced Tomatoes and Green Chillies", "1 Can Black Beans", "1 can pinto beans", "1 packet taco seasoning", "8oz Cream cheese", "Mexican Cheese", "Tortillas"]}, {"id": "enchillda-pasta", "name": "Enchillda Pasta", "recipeName": "Enchilada Soup", "recipeUrl": "", "ingredients": ["8oz chickpea pasta", "2.5 cups red enchillada sauce", "1 cup refried beans", "1 cup crushed tomatoes", "2 cups veggie broth", "1 cup corn", "2 cups black beans", "chili powder", "cumin", "cheese to top", "1 Large Onion"]}, {"id": "butternut-squash-soup", "name": "Butternut Squash Soup", "recipeName": "Butternut Squash Soup: Everything goes in the pot, low boil for 30 minutes. Let cool a bit, put in blender until smooth, Reheat as neccesary.", "recipeUrl": "", "ingredients": ["1 clove garlic", "4T butta", "1 Butternut Squash, peeled and cut into 1/2\" rings", "1/2 cup chopped apricots or apples", "4C chicken or veggie broth", "1 tsp Curry powder", "Cinnamon", "Clove", "Salt", "Pepper"]}, {"id": "potato-soup", "name": "Potato Soup", "recipeName": "Creamy Potato Soup", "recipeUrl": "", "ingredients": ["6 strips bacon", "1 Large Onion", "2.5 pounds golden potatoes", "4 cups chicken broth", "Milk", "Heavy Cream"]}, {"id": "mac-and-cheese", "name": "Mac and Cheese!", "recipeName": "Mac and Cheese: See Obsidian", "recipeUrl": "", "ingredients": ["Macaroni Noodles", "1cup Mozz Cheese", "Velveeta", "Flour", "Planko Bread Crumbs", "Heavy Cream"]}, {"id": "spinach-and-mushroom-quesidillas", "name": "Spinach and Mushroom Quesidillas", "recipeName": "Spinach and Mushroom Quesidillas", "recipeUrl": "", "ingredients": ["8oz Mushrooms", "1/2lb Spinach", "8oz Mozzarella", "7in Flour Tortillas", "Sour Cream"]}, {"id": "eggs-pineapple-ham-and-toast", "name": "Eggs, Pineapple Ham and Toast", "recipeName": "", "recipeUrl": "", "ingredients": ["Eggs", "Ham", "Canned Pineapple", "Bread", "Holly's vegy Sausages"]}, {"id": "sweet-potato-burritos", "name": "Sweet Potato Burritos", "recipeName": "Sweet Potato Burritos", "recipeUrl": "", "ingredients": ["2 Medium Sweet potatoes", "1 Large Onion", "1 can diced tomatoes", "1 Can Black Beans", "1 avocado", "Full Fat Sour Cream", "wraps", "1 lime", "oregano", "cumin", "paprika"]}, {"id": "burgers", "name": "Burgers!", "recipeName": "", "recipeUrl": "", "ingredients": ["Angus Frozen Hamburger", "Hamburger Buns", "Lettuce", "Tomato", "1 Large Onion"]}, {"id": "crunchwrap-supreme", "name": "Crunchwrap Supreme", "recipeName": "Crunchwrap Supreme", "recipeUrl": "", "ingredients": ["The Biggest Flour Wraps", "The Smallest Flour Wraps", "Rotissere Chicken, Shredded", "Salsa", "Mexican Cheese", "Tostada or Tortilla Chips"]}, {"id": "homemade-meat-sauce-and-spaghetti", "name": "Homemade Meat Sauce and Spaghetti", "recipeName": "Italian Meat Sauce", "recipeUrl": "", "ingredients": ["1 Large Onion", "2 Lbs Ground Beef", "5 Cloves Garlic", "2 tsp granulated garlic", "2 tsp salt", "1 tsp salt", "4 tablespoons tomato paste", "28 Ounce Can Ground Peeled Tomatos", "28 Ounce Tomato Puree", "2 tbsp basil", "2 tbsp sugar", "Spaghetti"]}, {"id": "nachos", "name": "Nachos", "recipeName": "", "recipeUrl": "", "ingredients": ["1 Bag Tortilla Chips", "Ground Beef", "Salsa", "Cheese", "1 White Onion", "1 Red Pepper", "1 Green Pepper", "1 Pckg. Cherry Tomatoes", "1 Can Jackfruit"]}, {"id": "froot-salad", "name": "Froot Salad", "recipeName": "", "recipeUrl": "", "ingredients": ["Watermelon", "Grapes", "Cantelope", "Strawberries", "Bluberries"]}, {"id": "chicken-and-veggie-pan-roast", "name": "Chicken and Veggie Pan Roast", "recipeName": "Chicken Veggie Roast", "recipeUrl": "", "ingredients": ["1.5 lb chicken breasts", "3 medium red potatoes", "1 red onion", "fresh green beans", "2 carrots", "Mayo", "Dijon Mustard", "Yellow Mustard", "Honey"]}, {"id": "marry-me-chicken", "name": "Marry Me Chicken", "recipeName": "Marry Me Chicken - Little Sunny Kitchen", "recipeUrl": "", "ingredients": ["3 large chicken breasts (or 6 chicken cutlets)", "Chicken Broth", "Heavy Cream", "grated parmesean", "chili flakes", "oregano", "thyme", "Sundried Tomatoes", "Fresh Basil Leaves", "garlic", "olive oil", "flour"]}];

function slugify(text) {
  return (text || "")
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "") || "dinner-" + Math.random().toString(36).slice(2,8);
}

function escapeHtml(str) {
  return (str ?? "").replace(/[&<>\"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}

function isLikelyUrl(value) {
  return /^https?:\/\//i.test((value || "").trim());
}

function getState() {
  const saved = localStorage.getItem("ezfood_state_v1");
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      return {
        dinners: Array.isArray(parsed.dinners) ? parsed.dinners : structuredClone(DEFAULT_DINNERS),
        selectedDinnerIds: Array.isArray(parsed.selectedDinnerIds) ? parsed.selectedDinnerIds.slice(0,3) : ["","",""],
        checkedMap: parsed.checkedMap || {},
        generated: !!parsed.generated,
        databaseVersion: parsed.databaseVersion || DEFAULT_VERSION
      };
    } catch (e) {}
  }
  return {
    dinners: structuredClone(DEFAULT_DINNERS),
    selectedDinnerIds: ["","",""],
    checkedMap: {},
    generated: false,
    databaseVersion: DEFAULT_VERSION
  };
}

let state = getState();

function saveState() {
  localStorage.setItem("ezfood_state_v1", JSON.stringify(state));
}

const dinnerRows = document.getElementById("dinnerRows");
const recipeLinks = document.getElementById("recipeLinks");
const shoppingList = document.getElementById("shoppingList");
const editorSelect = document.getElementById("editorSelect");
const ingredientEditor = document.getElementById("ingredientEditor");
const dbVersionText = document.getElementById("dbVersionText");
const dbMessage = document.getElementById("dbMessage");
const editorMessage = document.getElementById("editorMessage");
const downloadArea = document.getElementById("downloadArea");

function switchTab(tab) {
  document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === tab));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.getElementById("tab-" + tab).classList.add("active");
}

document.querySelectorAll(".tab-btn").forEach(btn => btn.addEventListener("click", () => switchTab(btn.dataset.tab)));

function getDinnerById(id) {
  return state.dinners.find(d => d.id === id);
}

function getSelectedUsedByOther(index) {
  return state.selectedDinnerIds.filter((id, i) => i !== index && id);
}

function renderDinnerRows() {
  dinnerRows.innerHTML = "";
  for (let i = 0; i < 3; i++) {
    const usedElsewhere = new Set(getSelectedUsedByOther(i));
    const row = document.createElement("div");
    row.className = "dinner-row";

    const label = document.createElement("label");
    label.textContent = `Dinner ${i+1}:`;

    const controls = document.createElement("div");
    controls.className = "dinner-controls";

    const select = document.createElement("select");
    select.dataset.index = i;
    const blank = document.createElement("option");
    blank.value = "";
    blank.textContent = "Select dinner";
    select.appendChild(blank);

    const sorted = [...state.dinners].sort((a,b) => a.name.localeCompare(b.name));
    sorted.forEach(d => {
      const opt = document.createElement("option");
      opt.value = d.id;
      opt.textContent = d.name;
      if (usedElsewhere.has(d.id)) opt.disabled = true;
      if (state.selectedDinnerIds[i] === d.id) opt.selected = true;
      select.appendChild(opt);
    });

    select.addEventListener("change", (e) => {
      const value = e.target.value;
      if (value && state.selectedDinnerIds.some((id, idx) => idx !== i && id === value)) {
        e.target.value = "";
        return;
      }
      state.selectedDinnerIds[i] = value;
      saveState();
      renderDinnerRows();
      renderRecipes();
      renderShoppingList();
    });

    const randBtn = document.createElement("button");
    randBtn.className = "mini-btn rand";
    randBtn.textContent = "Randomize";
    randBtn.addEventListener("click", () => randomizeSlot(i, select));

    const clearBtn = document.createElement("button");
    clearBtn.className = "mini-btn clear";
    clearBtn.textContent = "Clear";
    clearBtn.addEventListener("click", () => {
      state.selectedDinnerIds[i] = "";
      saveState();
      renderDinnerRows();
      renderRecipes();
      renderShoppingList();
    });

    controls.appendChild(select);
    controls.appendChild(randBtn);
    controls.appendChild(clearBtn);

    row.appendChild(label);
    row.appendChild(controls);
    dinnerRows.appendChild(row);
  }
}

function randomizeSlot(index, selectEl) {
  const excluded = new Set(getSelectedUsedByOther(index));
  const options = state.dinners.filter(d => !excluded.has(d.id));
  if (!options.length) return;
  let ticks = 0;
  const spinCount = 10 + Math.floor(Math.random() * 8);
  const timer = setInterval(() => {
    const candidate = options[Math.floor(Math.random() * options.length)];
    if (selectEl) selectEl.value = candidate.id;
    ticks++;
    if (ticks >= spinCount) {
      clearInterval(timer);
      const finalChoice = options[Math.floor(Math.random() * options.length)];
      state.selectedDinnerIds[index] = finalChoice.id;
      saveState();
      renderDinnerRows();
      renderRecipes();
      renderShoppingList();
    }
  }, 70);
}

function randomizeAll() {
  const pool = [...state.dinners];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  state.selectedDinnerIds = [pool[0]?.id || "", pool[1]?.id || "", pool[2]?.id || ""];
  saveState();
  renderDinnerRows();
  renderRecipes();
  renderShoppingList();
}

function renderRecipes() {
  recipeLinks.innerHTML = "";
  if (!state.generated) {
    recipeLinks.innerHTML = '<div class="muted">Nothing generated yet.</div>';
    return;
  }
  const selected = state.selectedDinnerIds.map(getDinnerById).filter(Boolean);
  if (!selected.length) {
    recipeLinks.innerHTML = '<div class="muted">No dinners selected.</div>';
    return;
  }
  selected.forEach(d => {
    const url = (d.recipeUrl || "").trim();
    const label = (d.recipeName || d.name || "Recipe").trim();
    const item = document.createElement(isLikelyUrl(url) ? "a" : "div");
    item.className = "recipe-link" + (isLikelyUrl(url) ? "" : " disabled");
    item.textContent = d.name + (label && label !== d.name ? " — " + label : "");
    if (isLikelyUrl(url)) {
      item.href = url;
      item.target = "_blank";
      item.rel = "noopener noreferrer";
    } else {
      item.title = "No valid recipe URL yet";
    }
    recipeLinks.appendChild(item);
  });
}

function buildShoppingEntries() {
  const selected = state.selectedDinnerIds.map(getDinnerById).filter(Boolean);
  const counts = new Map();
  selected.forEach(d => (d.ingredients || []).forEach(item => {
    const text = (item || "").trim();
    if (!text) return;
    counts.set(text, (counts.get(text) || 0) + 1);
  }));

  const generatedItems = [...counts.entries()].map(([text, count]) => {
    const label = count > 1 ? `${text} (x${count})` : text;
    return { key: "gen::" + text, text: label, rawText: text, type: "Dinner" };
  });

  const manualItems = (state.checkedMap.__extraItems || []).map(item => ({
    key: "extra::" + item.id,
    text: item.text,
    rawText: item.text,
    type: "Extra"
  }));

  return [...generatedItems, ...manualItems];
}

function renderShoppingList() {
  shoppingList.innerHTML = "";
  const items = buildShoppingEntries();
  if (!items.length) {
    shoppingList.innerHTML = '<div class="muted">Your shopping list will appear here.</div>';
    return;
  }

  items.forEach(item => {
    const row = document.createElement("label");
    row.className = "shop-item";
    const checked = !!state.checkedMap[item.key];
    if (checked) row.classList.add("checked");

    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = checked;
    cb.addEventListener("change", () => {
      state.checkedMap[item.key] = cb.checked;
      saveState();
      renderShoppingList();
    });

    const text = document.createElement("div");
    text.className = "text";
    text.textContent = item.text;

    const pill = document.createElement("div");
    pill.className = "item-type";
    pill.textContent = item.type;

    row.appendChild(cb);
    row.appendChild(text);
    row.appendChild(pill);

    if (item.key.startsWith("extra::")) {
      const remove = document.createElement("button");
      remove.type = "button";
      remove.className = "ghost-btn danger";
      remove.style.padding = "6px 10px";
      remove.style.fontWeight = "700";
      remove.style.boxShadow = "none";
      remove.textContent = "Remove";
      remove.addEventListener("click", (e) => {
        e.preventDefault();
        const id = item.key.split("extra::")[1];
        state.checkedMap.__extraItems = (state.checkedMap.__extraItems || []).filter(x => x.id !== id);
        delete state.checkedMap[item.key];
        saveState();
        renderShoppingList();
      });
      row.appendChild(remove);
    }

    shoppingList.appendChild(row);
  });
}

function addExtraItem() {
  const input = document.getElementById("extraItemInput");
  const value = input.value.trim();
  if (!value) return;
  state.checkedMap.__extraItems = state.checkedMap.__extraItems || [];
  state.checkedMap.__extraItems.push({
    id: "x" + Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    text: value
  });
  input.value = "";
  saveState();
  renderShoppingList();
  switchTab("shopping");
}

document.getElementById("addExtraBtn").addEventListener("click", addExtraItem);
document.getElementById("extraItemInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") addExtraItem();
});

document.getElementById("generateBtn").addEventListener("click", () => {
  state.generated = true;
  saveState();
  renderRecipes();
  renderShoppingList();
  switchTab("shopping");
});

document.getElementById("randomizeAllBtn").addEventListener("click", randomizeAll);

function renderEditorSelect() {
  const current = editorSelect.value;
  editorSelect.innerHTML = "";
  const newOpt = document.createElement("option");
  newOpt.value = "__new__";
  newOpt.textContent = "New Dinner";
  editorSelect.appendChild(newOpt);

  [...state.dinners].sort((a,b)=>a.name.localeCompare(b.name)).forEach(d => {
    const opt = document.createElement("option");
    opt.value = d.id;
    opt.textContent = d.name;
    editorSelect.appendChild(opt);
  });
  editorSelect.value = current && [...editorSelect.options].some(o => o.value === current) ? current : "__new__";
}

function createIngredientInput(value="") {
  const wrap = document.createElement("div");
  wrap.className = "ingredient-row";
  const input = document.createElement("input");
  input.type = "text";
  input.value = value;
  input.placeholder = "Ingredient";
  const del = document.createElement("button");
  del.type = "button";
  del.className = "ghost-btn danger";
  del.style.boxShadow = "none";
  del.textContent = "Remove";
  del.addEventListener("click", () => wrap.remove());
  wrap.appendChild(input);
  wrap.appendChild(del);
  return wrap;
}

function loadEditor(value) {
  const dinner = value === "__new__" ? null : getDinnerById(value);
  document.getElementById("editorTitle").value = dinner?.name || "";
  document.getElementById("editorRecipeName").value = dinner?.recipeName || "";
  document.getElementById("editorRecipeUrl").value = dinner?.recipeUrl || "";
  ingredientEditor.innerHTML = "";
  const ingredients = dinner ? (dinner.ingredients || []) : ["","","","",""];
  ingredients.forEach(item => ingredientEditor.appendChild(createIngredientInput(item)));
  editorMessage.textContent = "";
}

editorSelect.addEventListener("change", () => loadEditor(editorSelect.value));
document.getElementById("addIngredientBtn").addEventListener("click", () => ingredientEditor.appendChild(createIngredientInput("")));

document.getElementById("saveDinnerBtn").addEventListener("click", () => {
  const title = document.getElementById("editorTitle").value.trim();
  const recipeName = document.getElementById("editorRecipeName").value.trim();
  const recipeUrl = document.getElementById("editorRecipeUrl").value.trim();
  const ingredients = [...ingredientEditor.querySelectorAll("input")].map(i => i.value.trim()).filter(Boolean);

  if (!title) {
    editorMessage.textContent = "Please enter a dinner title.";
    return;
  }

  const selected = editorSelect.value;
  if (selected === "__new__") {
    let id = slugify(title);
    let counter = 2;
    while (state.dinners.some(d => d.id === id)) {
      id = slugify(title) + "-" + counter++;
    }
    state.dinners.push({ id, name: title, recipeName, recipeUrl, ingredients });
    editorSelect.value = id;
    editorMessage.textContent = "New dinner saved.";
  } else {
    const dinner = getDinnerById(selected);
    if (!dinner) return;
    dinner.name = title;
    dinner.recipeName = recipeName;
    dinner.recipeUrl = recipeUrl;
    dinner.ingredients = ingredients;
    editorMessage.textContent = "Dinner updated.";
  }

  // refresh ids in selections if names changed? ids stay stable for edits
  saveState();
  renderDinnerRows();
  renderRecipes();
  renderShoppingList();
  renderEditorSelect();
  if (selected === "__new__") {
    const newDinner = state.dinners[state.dinners.length - 1];
    editorSelect.value = newDinner.id;
  }
  loadEditor(editorSelect.value);
});

document.getElementById("deleteDinnerBtn").addEventListener("click", () => {
  const selected = editorSelect.value;
  if (selected === "__new__") {
    loadEditor("__new__");
    editorMessage.textContent = "Nothing to delete.";
    return;
  }
  state.dinners = state.dinners.filter(d => d.id !== selected);
  state.selectedDinnerIds = state.selectedDinnerIds.map(id => id === selected ? "" : id);
  saveState();
  renderDinnerRows();
  renderRecipes();
  renderShoppingList();
  renderEditorSelect();
  editorSelect.value = "__new__";
  loadEditor("__new__");
  editorMessage.textContent = "Dinner deleted.";
});

function downloadFile(filename, content, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

document.getElementById("exportBtn").addEventListener("click", () => {
  downloadFile("ez_food_dinners.json", JSON.stringify(state.dinners, null, 2), "application/json");
  dbMessage.textContent = "JSON exported.";
});

document.getElementById("importInput").addEventListener("change", async (e) => {
  const file = e.target.files?.[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!Array.isArray(data)) throw new Error("Expected an array");
    state.dinners = data.map((d, i) => ({
      id: d.id || slugify(d.name || ("dinner-" + (i+1))),
      name: d.name || ("Dinner " + (i+1)),
      recipeName: d.recipeName || "",
      recipeUrl: d.recipeUrl || "",
      ingredients: Array.isArray(d.ingredients) ? d.ingredients.filter(Boolean) : []
    }));
    saveState();
    renderDinnerRows();
    renderRecipes();
    renderShoppingList();
    renderEditorSelect();
    loadEditor("__new__");
    dbMessage.textContent = "JSON imported.";
  } catch (err) {
    dbMessage.textContent = "Import failed. Please use a valid JSON dinner file.";
  } finally {
    e.target.value = "";
  }
});

document.getElementById("resetBtn").addEventListener("click", () => {
  state.dinners = structuredClone(DEFAULT_DINNERS);
  state.selectedDinnerIds = ["","",""];
  state.checkedMap = {};
  state.generated = false;
  state.databaseVersion = DEFAULT_VERSION;
  saveState();
  renderAll();
  dbMessage.textContent = "Reset to baked-in default dinners.";
});

function incrementVersion(versionStr) {
  const parts = String(versionStr || "1.0").split(".");
  let major = parseInt(parts[0] || "1", 10);
  let minor = parseInt(parts[1] || "0", 10);
  minor += 1;
  return `${major}.${minor}`;
}

function buildStandaloneHtml(dinners, version) {
  // Build a fresh downloadable copy of this app with the current dinners/version baked in.
  let html = document.documentElement.outerHTML;
  html = html.replace(/const DEFAULT_VERSION = ".*?";/, 'const DEFAULT_VERSION = "' + version.replace(/"/g, '&quot;') + '";');
  html = html.replace(/const DEFAULT_DINNERS = [\s\S]*?;\n\nfunction slugify/, 'const DEFAULT_DINNERS = ' + JSON.stringify(dinners) + ';\n\nfunction slugify');
  return "<!DOCTYPE html>\n" + html;
}

document.getElementById("updateInternalBtn").addEventListener("click", () => {
  const newVersion = incrementVersion(state.databaseVersion || DEFAULT_VERSION);
  state.databaseVersion = newVersion;
  saveState();
  dbVersionText.textContent = "Database Version: " + newVersion;

  const htmlContent = buildStandaloneHtml(state.dinners, newVersion);
  const blob = new Blob([htmlContent], { type: "text/html" });
  const url = URL.createObjectURL(blob);

  downloadArea.innerHTML = "";
  const box = document.createElement("div");
  box.className = "download-box";
  box.innerHTML = 'Updated app ready: <a href="' + url + '" download="ez_food_v' + newVersion.replace(/\./g, "_") + '.html">ez_food_v' + newVersion + '.html</a>';
  downloadArea.appendChild(box);
  dbMessage.textContent = "Internal database updated and baked into a new app file.";
});

function renderAll() {
  dbVersionText.textContent = "Database Version: " + (state.databaseVersion || DEFAULT_VERSION);
  renderDinnerRows();
  renderRecipes();
  renderShoppingList();
  renderEditorSelect();
  loadEditor("__new__");
}

renderAll();
</script>
</body>
</html>
